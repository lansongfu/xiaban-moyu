<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今天你下班了吗？</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: white;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .current-time {
      color: rgba(255,255,255,0.9);
      text-align: center;
      margin-bottom: 30px;
      font-size: 1.2rem;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    .status-btn {
      border: none;
      border-radius: 20px;
      padding: 25px 15px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      color: white;
    }

    .status-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .status-btn:active {
      transform: translateY(-2px);
    }

    .btn-moyu {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .btn-work {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .btn-xiaban {
      background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    }

    .stats-card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .stats-title {
      font-size: 1.3rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .stat-item {
      text-align: center;
      padding: 15px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 12px;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: #667eea;
      display: block;
    }

    .stat-label {
      font-size: 0.9rem;
      color: #666;
      margin-top: 5px;
      display: block;
    }

    .extra-stats {
      border-top: 1px solid #eee;
      padding-top: 20px;
      margin-top: 20px;
    }

    .extra-stat {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .extra-stat:last-child {
      border-bottom: none;
    }

    .extra-stat-label {
      color: #666;
    }

    .extra-stat-value {
      font-weight: bold;
      color: #333;
    }

    .current-status {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      text-align: center;
      font-weight: bold;
      color: #333;
    }

    .loading {
      text-align: center;
      color: rgba(255,255,255,0.8);
      padding: 20px;
    }

    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      background: #f00;
      animation: confetti 3s ease-out forwards;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 今天你下班了吗？</h1>
    <div class="current-time" id="currentTime">加载中...</div>

    <div class="buttons">
      <button class="status-btn btn-moyu" onclick="clockIn('摸鱼')">🐟 摸鱼</button>
      <button class="status-btn btn-work" onclick="clockIn('打工中')">💼 打工中</button>
      <button class="status-btn btn-xiaban" onclick="clockIn('下班')">🏃 下班</button>
    </div>

    <div class="stats-card">
      <div class="stats-title">📊 今日数据</div>
      
      <div class="current-status" id="currentStatus">
        加载中...
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-number" id="moyuCount">-</span>
          <span class="stat-label">🐟 摸鱼</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="workCount">-</span>
          <span class="stat-label">💼 打工中</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="xiabanCount">-</span>
          <span class="stat-label">🏃 已下班</span>
        </div>
      </div>

      <div class="extra-stats">
        <div class="extra-stat">
          <span class="extra-stat-label">🏆 最早下班</span>
          <span class="extra-stat-value" id="earliest">-</span>
        </div>
        <div class="extra-stat">
          <span class="extra-stat-label">😴 最晚下班</span>
          <span class="extra-stat-value" id="latest">-</span>
        </div>
        <div class="extra-stat">
          <span class="extra-stat-label">🎯 你的排名</span>
          <span class="extra-stat-value" id="rank">-</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';

    // 更新时间
    function updateTime() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dateStr = now.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('currentTime').textContent = `${dateStr} ${timeStr}`;
    }

    // 打卡
    async function clockIn(status) {
      try {
        const response = await fetch(`${API_BASE}/api/clock`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        
        const result = await response.json();
        
        if (result.success) {
          // 放烟花动画
          createConfetti();
          // 更新状态
          document.getElementById('currentStatus').textContent = `你当前状态：${status}`;
          document.getElementById('rank').textContent = `第 ${result.rank} 个`;
          // 刷新数据
          loadStats();
        }
      } catch (error) {
        console.error('Clock in error:', error);
        alert('打卡失败，请重试');
      }
    }

    // 加载统计数据
    async function loadStats() {
      try {
        const response = await fetch(`${API_BASE}/api/stats`);
        const result = await response.json();
        
        if (result.success) {
          const data = result.data;
          document.getElementById('moyuCount').textContent = data.moyu;
          document.getElementById('workCount').textContent = data.work;
          document.getElementById('xiabanCount').textContent = data.xiaban;
          
          if (data.earliest) {
            const time = new Date(data.earliest.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('earliest').textContent = `${time} - ${data.earliest.user}`;
          }
          
          if (data.latest) {
            const time = new Date(data.latest.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('latest').textContent = `${time} - ${data.latest.user}`;
          }
        }
      } catch (error) {
        console.error('Load stats error:', error);
      }
    }

    // 加载用户当前状态
    async function loadUserStatus() {
      try {
        const response = await fetch(`${API_BASE}/api/user-status`);
        const result = await response.json();
        
        if (result.success && result.data) {
          document.getElementById('currentStatus').textContent = `你当前状态：${result.data.status}`;
        } else {
          document.getElementById('currentStatus').textContent = '点击按钮开始打卡';
        }
      } catch (error) {
        console.error('Load user status error:', error);
      }
    }

    // 放烟花动画
    function createConfetti() {
      const colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff', '#f0f'];
      for (let i = 0; i < 50; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDelay = Math.random() * 2 + 's';
        document.body.appendChild(confetti);
        
        setTimeout(() => confetti.remove(), 5000);
      }
    }

    // 初始化
    updateTime();
    setInterval(updateTime, 1000);
    loadStats();
    loadUserStatus();
    setInterval(loadStats, 5000); // 每 5 秒刷新一次
  </script>
</body>
</html>
